<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Sora", "Segoe UI", sans-serif;
        background: #f4f7fb;
      }
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

:root {
  --primary: #0056b3;
  --secondary: #eef4ff;
  --text: #1a1a1a;
  --white: #ffffff;
  --accent: #00d4ff;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Inter', sans-serif;
}

body {
  background: var(--white);
  color: var(--text);
  overflow-x: hidden;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.5rem 5%;
  background: var(--white);
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-weight: 700;
  font-size: 1.5rem;
  letter-spacing: -1px;
  color: var(--primary);
}

.logo span {
  color: var(--text);
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 2rem;
}

.nav-item {
  text-decoration: none;
  color: var(--text);
  font-weight: 500;
  position: relative;
  padding: 5px 0;
  transition: color 0.3s ease;
}

.nav-item::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0%;
  height: 2px;
  background: var(--primary);
  transition: width 0.3s ease-in-out;
}

.nav-item:hover::after {
  width: 100%;
}

.nav-item:hover {
  color: var(--primary);
}

.hero {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  padding: 8rem 5%;
  align-items: center;
  background: linear-gradient(135deg, #f8faff 0%, #ffffff 100%);
}

.hero-content h1 {
  font-size: 3.5rem;
  line-height: 1.1;
  margin-bottom: 1.5rem;
}

.hero-content h1 span {
  color: var(--primary);
}

.hero-content p {
  font-size: 1.2rem;
  color: #666;
  margin-bottom: 2.5rem;
  max-width: 500px;
}

.btn-primary {
  background: var(--primary);
  color: white;
  border: none;
  padding: 0.8rem 1.8rem;
  border-radius: 4px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, background 0.2s;
}

.btn-primary:hover {
  background: #004494;
  transform: translateY(-2px);
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--primary);
  color: var(--primary);
  padding: 0.8rem 1.8rem;
  border-radius: 4px;
  margin-left: 1rem;
  font-weight: 600;
  cursor: pointer;
}

.hero-visual {
  display: flex;
  justify-content: center;
}

.chip-card {
  width: 300px;
  height: 300px;
  background: #222;
  border-radius: 12px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  animation: float 6s ease-in-out infinite;
}

.chip-icon {
  color: var(--accent);
  font-size: 3rem;
  font-weight: 800;
  border: 2px solid var(--accent);
  padding: 20px;
  border-radius: 8px;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

.stats {
  display: flex;
  justify-content: space-around;
  padding: 4rem 5%;
  background: var(--primary);
  color: white;
}

.stat-item {
  text-align: center;
}

.stat-item strong {
  display: block;
  font-size: 2.5rem;
}

.stat-item span {
  opacity: 0.8;
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}
    </style>
  </head>
  <body>
    <nav class="navbar">
  <div class="logo">ELECTRO<span>FLOW</span></div>
  <ul class="nav-links">
    <li><a href="#" class="nav-item">Products</a></li>
    <li><a href="#" class="nav-item">Manufacturing</a></li>
    <li><a href="#" class="nav-item">Supply Chain</a></li>
    <li><a href="#" class="nav-item">Quality</a></li>
  </ul>
  <button class="btn-primary">Request Quote</button>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Precision Engineering for <span>Global Electronics</span></h1>
    <p>Leading the industry in semiconductor distribution and custom PCB assembly with zero-defect commitment.</p>
    <div class="hero-btns">
      <button class="btn-primary">Explore Components</button>
      <button class="btn-secondary">View Capabilities</button>
    </div>
  </div>
  <div class="hero-visual">
    <div class="chip-card">
      <div class="circuit-pattern"></div>
      <div class="chip-icon">μP</div>
    </div>
  </div>
</section>

<section class="stats">
  <div class="stat-item"><strong>50M+</strong><span>Parts in Stock</span></div>
  <div class="stat-item"><strong>24h</strong><span>Global Shipping</span></div>
  <div class="stat-item"><strong>ISO 9001</strong><span>Certified Quality</span></div>
</section>
    <script>
      document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('mouseover', () => {
    item.style.transform = 'translateY(-2px)';
  });
  item.addEventListener('mouseout', () => {
    item.style.transform = 'translateY(0)';
  });
});
    </script>
  </body>
</html>
